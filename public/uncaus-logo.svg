<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 196" role="img" aria-label="UNCAUS">
  <!-- Isotipo UNCAUS (reproducción vectorial aproximada). El fondo es transparente: la
       franja clara entre el azul y el verde es el espacio negativo (la onda blanca). -->

  <!-- Azul: banner superior con onda inferior y punta hacia abajo a la derecha -->
  <path fill="#2BAAE0"
        d="M8 10 H150 V38
           C140 64 122 86 106 92
           C92 84 80 72 66 78
           C54 83 45 100 35 99
           C25 97 15 84 8 70 Z"/>

  <!-- Verde: hoja inferior izquierda, apuntando hacia abajo -->
  <path fill="#54A636"
        d="M40 110
           C60 103 84 115 84 124
           C82 146 72 166 61 184
           C53 157 46 134 40 110 Z"/>
</svg>
