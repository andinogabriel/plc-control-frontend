version: 2
updates:
  # npm dependencies. Minor/patch bumps are grouped into a single weekly PR to keep the
  # noise low for a solo maintainer; majors come as individual PRs (reviewed by hand).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # eslint 10 (and its lockstep sibling @eslint/js) is blocked until
      # eslint-plugin-jsx-a11y supports it (peers eslint <=9). Remove both once the
      # plugin ships eslint 10 support.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  # Keep the GitHub Actions in the CI workflow current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
