version: 2
updates:
  # npm dependencies. Minor/patch bumps are grouped into a single weekly PR to keep the
  # noise low for a solo maintainer; majors come as individual PRs (reviewed by hand).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Keep the GitHub Actions in the CI workflow current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
